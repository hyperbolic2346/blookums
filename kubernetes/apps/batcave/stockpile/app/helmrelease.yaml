---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stockpile
  namespace: batcave
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: stockpile
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-pull

    controllers:
      api:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # 1) create the stockpile database + role on the shared CNPG cluster
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
            envFrom: &envFrom
              - secretRef:
                  name: stockpile-secret
          # 2) apply Prisma migrations
          02-migrate:
            image: &apiImage
              repository: ghcr.io/hyperbolic2346/stockpile-api
              tag: latest
            command: ["npx", "prisma", "migrate", "deploy"]
            envFrom: *envFrom
          # 3) seed vendors/tenants/catalog (idempotent upserts)
          03-seed:
            image: *apiImage
            command: ["node", "dist/seed/main.js"]
            envFrom: *envFrom

        containers:
          main:
            image: *apiImage
            command: ["node", "dist/main.js"]
            env:
              API_PORT: "8000"
              REDIS_URL: "redis://dragonfly.databases.svc.cluster.local:6379"
              AUTH_CALLBACK_URL: "https://stockpile.${SECRET_DOMAIN}/api/auth/google/callback"
              AUTH_SECURE_COOKIES: "true"
              AUTH_POST_LOGIN_REDIRECT: "/"
              DEFAULT_TENANT: "demo"
            envFrom: *envFrom
            probes:
              liveness: &apiProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 8000
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness: *apiProbe
              startup:
                enabled: false
            resources:
              requests:
                cpu: 25m
                memory: 192Mi
              limits:
                memory: 512Mi

      worker:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image: *apiImage
            command: ["node", "dist/worker/main.js"]
            env:
              REDIS_URL: "redis://dragonfly.databases.svc.cluster.local:6379"
            envFrom: *envFrom
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 384Mi

      web:
        containers:
          main:
            image:
              repository: ghcr.io/hyperbolic2346/stockpile-web
              tag: latest
            env:
              PUBLIC_API_URL: "https://stockpile.${SECRET_DOMAIN}"
              PORT: "3000"
            probes:
              liveness: &webProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 5
                  periodSeconds: 30
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness: *webProbe
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 192Mi

    service:
      api:
        controller: api
        ports:
          http:
            port: 8000
      web:
        controller: web
        ports:
          http:
            port: 3000

    route:
      app:
        hostnames: ["stockpile.${SECRET_DOMAIN}"]
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          # /api -> NestJS backend (more specific prefix wins per Gateway API)
          - matches:
              - path:
                  type: PathPrefix
                  value: /api
            backendRefs:
              - identifier: api
                port: 8000
          # everything else -> the SvelteKit app
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: web
                port: 3000
