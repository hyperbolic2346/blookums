---
# App config + database. Pulls app secrets from the 1Password item "stockpile"
# and the shared superuser creds from "cloudnative-pg".
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stockpile
  namespace: batcave
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: stockpile-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Prisma / app database (own DB + role on the shared CNPG cluster)
        DATABASE_URL: "postgresql://{{ .POSTGRES_USER }}:{{ .POSTGRES_PASS }}@postgres-rw.databases.svc.cluster.local:5432/stockpile?sslmode=disable"
        # Auth (Google OAuth + allow-list; session signing)
        AUTH_SESSION_SECRET: "{{ .AUTH_SESSION_SECRET }}"
        GOOGLE_CLIENT_ID: "{{ .GOOGLE_CLIENT_ID }}"
        GOOGLE_CLIENT_SECRET: "{{ .GOOGLE_CLIENT_SECRET }}"
        AUTH_ALLOWED_EMAILS: "{{ .AUTH_ALLOWED_EMAILS }}"
        # Envelope-encryption master key for stored plugin secrets (32-byte base64)
        SECRETS_ENCRYPTION_KEY: "{{ .SECRETS_ENCRYPTION_KEY }}"
        # RSR integrator account for the global catalog sync (FTPS)
        RSR_FTP_USER: "{{ .RSR_FTP_USER }}"
        RSR_FTP_PASSWORD: "{{ .RSR_FTP_PASSWORD }}"
        # Postgres init (creates the stockpile DB + role on the shared cluster)
        INIT_POSTGRES_DBNAME: stockpile
        INIT_POSTGRES_HOST: postgres-rw.databases.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_USER: "{{ .POSTGRES_SUPER_USER }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: stockpile
    - extract:
        key: cloudnative-pg
---
# Pull secret for the private GHCR images. GitHub PAT with read:packages stored
# in the "stockpile" 1Password item (GHCR_USER / GHCR_TOKEN).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stockpile-ghcr
  namespace: batcave
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: stockpile-ghcr-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"auth":"{{ printf "%s:%s" .GHCR_USER .GHCR_TOKEN | b64enc }}"}}}
  dataFrom:
    - extract:
        key: stockpile
