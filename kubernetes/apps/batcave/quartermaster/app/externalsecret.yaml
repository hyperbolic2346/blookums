---
# App config + database. Pulls app-specific values from the 1Password item
# "quartermaster" and the shared superuser creds from "cloudnative-pg".
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: quartermaster
  namespace: batcave
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: quartermaster-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # App config
        QM_DATABASE_URL: "postgresql+psycopg://{{ .POSTGRES_USER }}:{{ .POSTGRES_PASS }}@postgres-rw.databases.svc.cluster.local:5432/quartermaster?sslmode=disable"
        QM_SESSION_SECRET: "{{ .QM_SESSION_SECRET }}"
        QM_GOOGLE_CLIENT_ID: "{{ .QM_GOOGLE_CLIENT_ID }}"
        QM_GOOGLE_CLIENT_SECRET: "{{ .QM_GOOGLE_CLIENT_SECRET }}"
        QM_ALLOWED_EMAILS: "{{ .QM_ALLOWED_EMAILS }}"
        # Postgres init (creates the quartermaster DB + role on the shared cluster)
        INIT_POSTGRES_DBNAME: quartermaster
        INIT_POSTGRES_HOST: postgres-rw.databases.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_USER: "{{ .POSTGRES_SUPER_USER }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: quartermaster
    - extract:
        key: cloudnative-pg
---
# Pull secret for the private GHCR images (they bake in inventory data, so stay
# private). Uses a GitHub PAT with read:packages stored in the "quartermaster" item.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: quartermaster-ghcr
  namespace: batcave
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: ghcr-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"auth":"{{ printf "%s:%s" .GHCR_USER .GHCR_TOKEN | b64enc }}"}}}
  dataFrom:
    - extract:
        key: quartermaster
---
# Seed data (the gun roster + shoot history) injected from 1Password as a
# base64 field, decoded into a file that the seed init container imports once.
# Kept entirely out of git and the image.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: quartermaster-data
  namespace: batcave
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: quartermaster-data
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        legacy_data.json: "{{ .LEGACY_DATA_B64 | b64dec }}"
  dataFrom:
    - extract:
        key: quartermaster-data
