---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: esphome
  namespace: home
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: esphome-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        USERNAME: "{{ .USERNAME }}"
        PASSWORD: "{{ .PASSWORD }}"
  dataFrom:
    - extract:
        key: esphome
