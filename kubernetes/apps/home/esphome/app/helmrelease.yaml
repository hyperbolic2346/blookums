---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: esphome
  namespace: home
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: esphome
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: ghcr.io/esphome/esphome
              tag: 2025.12.7
            env:
              TZ: ${TIMEZONE}
              ESPHOME_DASHBOARD_USE_PING: "true"
            envFrom:
              - secretRef:
                  name: esphome-secret
            resources:
              requests:
                cpu: 50m
                memory: 256M
              limits:
                cpu: 2000m
                memory: 2Gi

    service:
      main:
        controller: main
        ports:
          http:
            port: 6052

    route:
      main:
        hostnames: ["esphome.${SECRET_DOMAIN}"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: 6052

    persistence:
      config:
        enabled: true
        existingClaim: esphome-config
        globalMounts:
          - path: /config
