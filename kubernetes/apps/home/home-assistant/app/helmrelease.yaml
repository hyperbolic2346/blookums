---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
  namespace: home
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: home-assistant
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom: &envFrom
              - secretRef:
                  name: home-assistant-secret
        containers:
          main:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.4.3@sha256:328680ff068d032fed0b0f64c26bd474ae6983e25d633ac8debce858a4742698
            env:
              TZ: ${TIMEZONE}
              HASS_UNIT_SYSTEM: imperial
              HASS_PURGE_KEEP_DAYS: 30
              HASS_EXTERNAL_URL: https://hass.${SECRET_DOMAIN}
              HASS_TRUSTED_PROXIES: ${CLUSTER_CIDR}
            envFrom: *envFrom
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 500m
                memory: 100M
              limits:
                cpu: 2500m
                memory: 1500M

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8123

    route:
      main:
        hostnames: ["hass.${SECRET_DOMAIN}"]
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: 8123

    persistence:
      config:
        enabled: true
        existingClaim: home-assistant-config
      config-yaml:
        type: configMap
        name: home-assistant-config
        globalMounts:
          - path: /config/configuration.yaml
            subPath: configuration.yaml
            readOnly: true
          - path: /config/automations.yaml
            subPath: automations.yaml
            readOnly: true
          - path: /config/scripts.yaml
            subPath: scripts.yaml
            readOnly: true
          - path: /config/scenes.yaml
            subPath: scenes.yaml
            readOnly: true
          - path: /config/groups.yaml
            subPath: groups.yaml
            readOnly: true
      config-sensors:
        type: configMap
        name: home-assistant-sensors
        globalMounts:
          - path: /config/sensors/basement.yaml
            subPath: basement.yaml
            readOnly: true
          - path: /config/sensors/emoncms.yaml
            subPath: emoncms.yaml
            readOnly: true
          - path: /config/sensors/front_door.yaml
            subPath: front_door.yaml
            readOnly: true
          - path: /config/sensors/office.yaml
            subPath: office.yaml
            readOnly: true
      config-mqtt:
        type: configMap
        name: home-assistant-mqtt
        globalMounts:
          - path: /config/mqtt/gate.yaml
            subPath: gate.yaml
            readOnly: true
          - path: /config/mqtt/sonoff-bathroom-fan.yaml
            subPath: sonoff-bathroom-fan.yaml
            readOnly: true
      config-dashboards:
        type: configMap
        name: home-assistant-dashboards
        globalMounts:
          - path: /config/dashboards/dashboard_simple.yaml
            subPath: dashboard_simple.yaml
            readOnly: true
          - path: /config/dashboards/dashboard_minimalist.yaml
            subPath: dashboard_minimalist.yaml
            readOnly: true
          - path: /config/dashboards/dashboard_ipad.yaml
            subPath: dashboard_ipad.yaml
            readOnly: true
          - path: /config/dashboards/map.yaml
            subPath: map.yaml
            readOnly: true
      secrets-yaml:
        type: secret
        name: home-assistant-secret
        globalMounts:
          - path: /config/secrets.yaml
            subPath: HASS_SECRETS_YAML
            readOnly: true
