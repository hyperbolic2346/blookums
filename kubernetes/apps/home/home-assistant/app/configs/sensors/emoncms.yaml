- sensor:
    - name: "House Energy"
      unique_id: house_energy_kwh
      state: "{{ states('sensor.emoncms_10_0_1_210_emoncms_house_power_kwh') | float(0) | round(2) }}"
      unit_of_measurement: "kWh"
      state_class: total_increasing
      device_class: energy

    - name: "House Power"
      unique_id: house_power_w
      state: "{{ states('sensor.emoncms_10_0_1_210_emoncms_house_power') | float(0) | round(0) }}"
      unit_of_measurement: "W"
      state_class: measurement
      device_class: power

    - name: "Left Panel Energy"
      unique_id: left_panel_energy_kwh
      state: "{{ states('sensor.emoncms_10_0_1_210_emoncms_left_side_panel_power_kwh') | float(0) | round(2) }}"
      unit_of_measurement: "kWh"
      state_class: total_increasing
      device_class: energy

    - name: "Left Panel Power"
      unique_id: left_panel_power_w
      state: "{{ states('sensor.emoncms_10_0_1_210_emoncms_left_side_panel_power') | float(0) | round(0) }}"
      unit_of_measurement: "W"
      state_class: measurement
      device_class: power

    - name: "Right Panel Energy"
      unique_id: right_panel_energy_kwh
      state: "{{ states('sensor.emoncms_10_0_1_210_emoncms_right_side_panel_power_kwh') | float(0) | round(2) }}"
      unit_of_measurement: "kWh"
      state_class: total_increasing
      device_class: energy

    - name: "Right Panel Power"
      unique_id: right_panel_power_w
      state: "{{ states('sensor.emoncms_10_0_1_210_emoncms_right_side_panel_power') | float(0) | round(0) }}"
      unit_of_measurement: "W"
      state_class: measurement
      device_class: power

    - name: "Billing Cycle Usage"
      unique_id: billing_cycle_usage
      state: >
        {% set current = states('sensor.house_energy') | float(0) %}
        {% set start = states('input_number.billing_cycle_start_kwh') | float(0) %}
        {{ (current - start) | round(1) }}
      unit_of_measurement: "kWh"
      icon: mdi:meter-electric

    - name: "Billing Cycle Days"
      unique_id: billing_cycle_days
      state: >
        {% set start = states('input_datetime.billing_cycle_start') %}
        {% if start not in ['unknown', 'unavailable'] %}
          {{ (now().date() - strptime(start, '%Y-%m-%d').date()).days }}
        {% else %}
          0
        {% endif %}
      unit_of_measurement: "days"
      icon: mdi:calendar-range

    - name: "Electric Rate"
      unique_id: electric_rate
      state: >
        {% set usage = states('sensor.billing_cycle_usage') | float(0) %}
        {% if usage <= 800 %}
          0.126223
        {% else %}
          0.116230
        {% endif %}
      unit_of_measurement: "$/kWh"
      icon: mdi:currency-usd

    - name: "Electric Bill Estimate"
      unique_id: electric_bill_estimate
      state: >
        {% set usage = states('sensor.billing_cycle_usage') | float(0) %}
        {% set tier1_rate = 0.126223 %}
        {% set tier2_rate = 0.116230 %}
        {% set tier1_limit = 800 %}
        {% if usage <= tier1_limit %}
          {{ (usage * tier1_rate) | round(2) }}
        {% else %}
          {{ ((tier1_limit * tier1_rate) + ((usage - tier1_limit) * tier2_rate)) | round(2) }}
        {% endif %}
      unit_of_measurement: "$"
      device_class: monetary
      icon: mdi:lightning-bolt

    - name: "Tier 1 Remaining"
      unique_id: tier1_remaining
      state: >
        {% set usage = states('sensor.billing_cycle_usage') | float(0) %}
        {{ [800 - usage, 0] | max | round(1) }}
      unit_of_measurement: "kWh"
      icon: mdi:gauge

    - name: "Projected Monthly Bill"
      unique_id: projected_monthly_bill
      state: >
        {% set usage = states('sensor.billing_cycle_usage') | float(0) %}
        {% set days = states('sensor.billing_cycle_days') | int(0) %}
        {% set tier1_rate = 0.126223 %}
        {% set tier2_rate = 0.116230 %}
        {% if days > 0 %}
          {% set daily_avg = usage / days %}
          {% set projected = daily_avg * 30 %}
          {% if projected <= 800 %}
            {{ (projected * tier1_rate) | round(2) }}
          {% else %}
            {{ ((800 * tier1_rate) + ((projected - 800) * tier2_rate)) | round(2) }}
          {% endif %}
        {% else %}
          0
        {% endif %}
      unit_of_measurement: "$"
      device_class: monetary
      icon: mdi:crystal-ball
