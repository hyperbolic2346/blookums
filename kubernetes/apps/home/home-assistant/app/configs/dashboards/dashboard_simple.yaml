- title: Laundry
  path: laundry
  icon: mdi:washing-machine
  cards:
  - type: vertical-stack
    cards:
    - type: horizontal-stack
      cards:
      - type: entities
        entities:
        - entity: sensor.booster_electric_consumption_w
          name: Booster
        - entity: binary_sensor.laundry_room_motion
          name: Motion
        - entity: switch.light
    - show_name: true
      show_icon: true
      type: button
      tap_action:
        action: toggle
      entity: switch.light
      name: Laundry
      icon: mdi:lightbulb-fluorescent-tube-outline
  - type: entities
    entities:
    - entity: switch.booster
- title: Basement Garage
  path: basement-garage
  icon: mdi:home-floor-b
  cards:
  - type: vertical-stack
    cards:
    - type: horizontal-stack
      cards:
      - type: entities
        entities:
        - entity: binary_sensor.750li_xdrive_door_lock_state
        - entity: sensor.750li_xdrive_mileage
        - entity: sensor.750li_xdrive_remaining_fuel
        - entity: binary_sensor.750li_xdrive_windows
        title: BMW Alpina
      - show_name: false
        show_icon: true
        type: button
        tap_action:
          action: toggle
        entity: button.alpina_xb7_activate_air_conditioning
        icon: mdi:air-conditioner
        show_state: true
    - type: horizontal-stack
      cards:
      - show_name: true
        show_icon: true
        type: button
        tap_action:
          action: toggle
        entity: light.basement_garage_light
      - show_name: true
        show_icon: true
        type: button
        tap_action:
          action: toggle
        entity: cover.basement_garage_door
        name: Door
    - type: entities
      entities:
      - entity: sensor.basement_hall_door_basement_hall_door_battery_level
        name: Door Sensor Battery
      - entity: binary_sensor.basement_hall_door_basement_hall_door_door_state_simple
        name: Door
        icon: mdi:door
      - entity: binary_sensor.basement_garage_obstruction
        name: Door Obstruction
- type: sections
  max_columns: 4
  title: Outside
  path: outside
  icon: mdi:outdoor-lamp
