views:
- title: Garage
  path: garage
  icon: mdi:garage
  cards:
  - type: vertical-stack
    cards:
    - type: horizontal-stack
      cards:
      - show_name: true
        show_icon: true
        type: button
        tap_action:
          action: toggle
        entity: cover.left_bay_door
        name: Left Bay
      - show_name: true
        show_icon: true
        type: button
        tap_action:
          action: toggle
        entity: cover.middle_bay_door
        name: Middle Bay
      - show_name: true
        show_icon: true
        type: button
        tap_action:
          action: toggle
        entity: cover.right_bay_door
        name: Right Bay
    - type: horizontal-stack
      cards:
      - show_name: true
        show_icon: true
        type: button
        tap_action:
          action: toggle
        entity: cover.basement_garage_door
        name: Basement
      - show_name: true
        show_icon: true
        type: button
        tap_action:
          action: toggle
        entity: cover.wilson_gate
      - show_name: true
        show_icon: true
        type: button
        tap_action:
          action: toggle
        entity: cover.brigman_gate
    - show_name: true
      show_icon: true
      type: button
      tap_action:
        action: toggle
      entity: input_boolean.delivery_tomorrow
- title: Master Bedroom
  path: master-bedroom
  cards:
  - type: vertical-stack
    cards:
    - type: horizontal-stack
      cards:
      - type: light
        entity: light.torus
        name: Torus
      - type: light
        entity: light.cans_3
        name: Hall
    - type: horizontal-stack
      cards:
      - show_name: true
        show_icon: true
        type: button
        tap_action:
          action: toggle
        name: Knobby Bed Light
        entity: light.knobby_light
      - type: entities
        entities:
        - entity: fan.master_bedroom
        - entity: light.torus
        - entity: sensor.master_bedroom_temperature
        - entity: switch.master_bedroom_whoosh
        - entity: binary_sensor.master_bedroom_occupancy
  - graph: line
    type: sensor
    entity: sensor.master_closet1_temperature
    detail: 1
    name: Master Closet
    unit: F
  - graph: line
    type: sensor
    entity: sensor.master_hall_temperature
    detail: 1
    name: Master Hall
  - graph: line
    type: sensor
    entity: sensor.master_bedroom_temperature
    detail: 1
    name: Master Bedroom
    unit: F
  - show_name: true
    show_icon: true
    type: button
    entity: script.goodnight_storms
  - type: media-control
    entity: media_player.master_bedroom
  icon: mdi:bed-king
  subview: false
- title: Master Bath
  path: master-bath
  icon: mdi:bathtub
  cards:
  - type: vertical-stack
    cards:
    - type: horizontal-stack
      cards:
      - show_name: true
        show_icon: true
        type: button
        tap_action:
          action: toggle
        entity: switch.master_bath_fan
        name: Fan
        icon: mdi:fan
      - type: entities
        entities:
        - entity: binary_sensor.master_bath0_motion
          name: Motion 0
        - entity: binary_sensor.master_bath1_motion
          name: Motion 1
        - entity: sensor.master_bath1_humidity
          name: Humidity
    - type: horizontal-stack
      cards:
      - type: light
        name: Cans
        entity: light.master_bath_cans
      - type: light
        entity: light.master_bath_shower
        name: Shower
      - type: light
        entity: light.master_bath_torus
        name: Torus
    - graph: line
      type: sensor
      entity: sensor.master_bath1_temperature
      detail: 1
      unit: F
      name: Master Bath
    - graph: line
      type: sensor
      entity: sensor.master_bath1_humidity
      detail: 1
      name: Master Bath Humidity
    - graph: line
      type: sensor
      entity: sensor.master_closet1_humidity
      detail: 1
      name: Master Closet Humidity
    - graph: line
      type: sensor
      entity: sensor.master_hall_humidity
      detail: 1
      name: Master Hall Humidity
    - type: horizontal-stack
      cards:
      - type: entity
        entity: automation.turn_on_shower_cans_with_fan
        name: Shower Lights with Fan
        icon: mdi:light-recessed
        state_color: true
      - type: entity
        entity: automation.master_bath_motion_lights
        state_color: true
    - graph: line
      type: sensor
      entity: sensor.master_bathroom_humidity_derivative
      detail: 1
  - type: media-control
    entity: media_player.master_bathroom
  subview: false
- title: Library
  path: library
  icon: mdi:bookshelf
  cards:
  - type: vertical-stack
    cards:
    - type: horizontal-stack
      cards:
      - type: light
        entity: light.cans
        name: Cans
      - type: light
        entity: light.shelves
        name: Shelves
    - type: horizontal-stack
      cards:
      - show_name: true
        show_icon: true
        type: button
        tap_action:
          action: toggle
        entity: fan.library
        name: Fan
      - type: entities
        entities:
        - entity: light.library
        - entity: binary_sensor.library_occupancy
          name: Occupancy
        - entity: sensor.library_temperature
          name: Temp
        - entity: switch.library_whoosh
          name: Whoosh
  subview: false
- title: Knobby Office
  path: knobby-office
  icon: mdi:office-building
  cards:
  - type: vertical-stack
    cards:
    - type: horizontal-stack
      cards:
      - show_name: true
        show_icon: true
        type: button
        tap_action:
          action: toggle
        entity: fan.library
        name: Fan
      - type: entities
