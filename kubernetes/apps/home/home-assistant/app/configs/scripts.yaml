goodnight_storms:
  alias: Goodnight Storms
  description: Play thunderstorm sounds on repeat in the bedroom
  sequence:
  - action: media_player.volume_set
    target:
      entity_id: media_player.master_bedroom
    data:
      volume_level: 0.2
  - action: media_player.play_media
    target:
      entity_id: media_player.master_bedroom
    data:
      media_content_id: /local/pptwaves.mp3
      media_content_type: music
  - delay: 00:00:02
  - action: media_player.repeat_set
    target:
      entity_id: media_player.master_bedroom
    data:
      repeat: one
  mode: single
  icon: mdi:weather-lightning-rainy
master_bath_fan_hold_on:
  alias: Master Bath Fan - Manual Hold On
  description: >-
    A2 (manual hold-on) handler. Turns the fan on, waits up to 5s for the switch
    to actually report 'on', and only then arms the override. If the device is
    offline/unresponsive the fan never reports on, so the override is NOT armed
    and cannot strand. The recovery side lives in automation 'Failsafe - Clear
    Master Fan Override When Fan Confirmed Off'.
  mode: single
  sequence:
  - action: switch.turn_on
    target:
      entity_id: switch.master_bath_fan
  - wait_template: "{{ is_state('switch.master_bath_fan', 'on') }}"
    timeout: "00:00:05"
    continue_on_timeout: true
  - condition: state
    entity_id: switch.master_bath_fan
    state: 'on'
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.master_fan_override
  icon: mdi:fan
