    to: Empty
  actions:
  - action: scene.turn_on
    target:
      entity_id: scene.master_bath_off
  mode: single
- id: '1774414069387'
  alias: Bathroom - Start Sound on Toilet Motion
  description: Start privacy sound when toilet sensor fires, not on room entry
  triggers:
  - trigger: state
    entity_id: binary_sensor.master_bath1_motion
    to: 'on'
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.master_bathroom
      state: playing
  actions:
  - action: media_player.volume_set
    target:
      entity_id: media_player.master_bathroom
    data:
      volume_level: "{{ states('input_number.bathroom_sound_volume') | float }}"
  - action: media_player.play_media
    target:
      entity_id: media_player.master_bathroom
    data:
      media_content_id: "https://hass.burntsheep.com/local/{{ states('input_select.bathroom_sound') }}.mp3"
      media_content_type: music
  - delay: 00:00:03
  - action: media_player.repeat_set
    target:
      entity_id: media_player.master_bathroom
    data:
      repeat: one
  mode: single
- id: '1774414307172'
  alias: Bathroom - Stop Sound on Empty
  description: When occupancy becomes Empty (set by AppDaemon), stop privacy sound
  triggers:
  - trigger: state
