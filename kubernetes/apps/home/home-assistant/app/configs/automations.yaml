- id: '1774415000001'
  alias: Master Bath - Lights On (Occupied)
  description: Turn on bathroom lights with time-of-day scene when occupancy becomes Occupied
  triggers:
  - trigger: state
    entity_id: input_select.master_bathroom_occupancy
    to: Occupied
  conditions:
  - condition: state
    entity_id: light.master_bath_cans
    state: 'off'
  actions:
  - action: scene.turn_on
    data:
      entity_id: >
        {% set hour = now().hour %}
        {% if hour >= 21 %}scene.master_bath_late_night
        {% elif hour >= 19 %}scene.master_bath_evening
        {% elif hour >= 11 %}scene.master_bath_day
        {% elif hour >= 6 %}scene.master_bath_morning
        {% else %}scene.master_bath_late_night{% endif %}
  mode: single
