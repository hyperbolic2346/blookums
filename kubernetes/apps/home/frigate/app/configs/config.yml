---
# Authentication configuration for Frigate 0.15.x
auth:
  enabled: false  # Disable authentication for now to fix the 500 errors

go2rtc:
  streams:
    gate:
      - rtsp://10.0.1.1:7447/t9w1bowAkyyxiKim
    gate-rear:
      - rtsp://10.0.1.1:7447/RxYUnH7TWc9B5bj8

detect:
  enabled: true

mqtt:
  host: 10.0.1.14
  port: 8883
  user: '{FRIGATE_MQTT_USER}'
  password: '{FRIGATE_MQTT_PASSWORD}'
  topic_prefix: frigate

database:
  path: /data/frigate.db

detectors:
  coral:
    type: edgetpu
    device: usb

model:
  path: plus://35877a6045227082ca72e73d6d34c72a

objects:
  track:
    - amazon
    - bear
    - car
    - cat
    - cow
    - deer
    - dog
    - face
    - fedex
    - license_plate
    - package
    - person
    - ups

record:
  enabled: true
  continuous:
    days: 3
  motion:
    days: 3
  alerts:
    retain:
      days: 30
      mode: active_objects
  detections:
    retain:
      days: 30
      mode: active_objects

review:
  alerts:
    labels:
      - amazon
      - bear
      - car
      - deer
      - dog
      - fedex
      - package
      - person
      - ups
  detections:
    labels:
      - amazon
      - bear
      - car
      - cat
      - cow
      - deer
      - dog
      - face
      - fedex
      - license_plate
      - package
      - person
      - ups

snapshots:
  enabled: true
  timestamp: false
  bounding_box: true
  crop: false
  retain:
    default: 365
    objects:
      bear: 3650

cameras:
  # --
  back-drive:
    detect:
      width: 1024
      height: 576
    ffmpeg:
      inputs:
        - path: rtsp://10.0.1.1:7447/Oj6JuFE5mX5zBOHL
          roles:
            - detect
        - path: rtsp://10.0.1.1:7447/iqLTysjs0mJIL0Mn
          roles:
            - record
    motion:
      mask:
        - 0,365,0,0,172,0
    zones:
      back_drive:
        coordinates: 174,254,332,54,1149,136,1062,350,884,292,488,362,270,470
      left_edge:
        coordinates: 0,647,0,404,168,290,264,475
      right_edge:
        coordinates: 1280,498,1280,171,1149,150,1058,336
      yard:
        coordinates: 1280,437,1093,345,753,308,441,398,0,635,0,720,1280,720
  # --
  front-door:
    detect:
      width: 960
      height: 720
    ffmpeg:
      inputs:
        - path: rtsps://10.0.1.1:7441/fGbT9roF3ehu1pD3?enableSrtp
          roles:
            - detect
        - path: rtsps://10.0.1.1:7441/OOpy17C6MJpV4NQs?enableSrtp
          roles:
            - record
  # --
  gate:
    detect:
      width: 1024
      height: 578
    ffmpeg:
      inputs:
        - path: rtsp://10.0.1.1:7447/t9w1bowAkyyxiKim
          roles:
            - detect
        - path: rtsp://10.0.1.1:7447/1wbphRIgh1ZRJjhG
          roles:
            - record
    zones:
      wilson:
        coordinates: 549,720,495,436,547,268,720,151,785,170,767,304,1280,520,1280,720
      brigman:
        coordinates: 497,245,327,720,0,720,172,486,375,233,544,134,695,140
    objects:
      filters:
        person:
          mask:
            - 0.372,0.894,0.289,0.854,0.217,0.398,0.288,0.301,0.237,0.103,0.174,0.135,0.092,0.383,0.189,0.417,0.277,0.863,0.231,0.893,0.202,1,0.405,1
  # --
  south-drive:
    detect:
      width: 1024
      height: 576
    ffmpeg:
      inputs:
        - path: rtsps://10.0.1.1:7441/PXdNXyUMYlTN10xu?enableSrtp
          roles:
            - detect
        - path: rtsps://10.0.1.1:7441/ZX52zu268Dp1Jf9f?enableSrtp
          roles:
            - record
  # --
  gate-rear:
    detect:
      width: 1024
      height: 578
    ffmpeg:
      inputs:
        - path: rtsp://10.0.1.1:7447/RxYUnH7TWc9B5bj8
          roles:
            - detect
        - path: rtsp://10.0.1.1:7447/5yttyhAdUKP7k9E4
          roles:
            - record
