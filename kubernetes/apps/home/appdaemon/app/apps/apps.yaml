Master Bath Fan:
  class: BathFan
  fan: switch.master_bath_fan
  fan_sensor: sensor.master_bath1_humidity
  light: light.master_bath_shower
  override: input_boolean.master_fan_override
  occupancy_entity: input_select.master_bathroom_occupancy
  module: bath_fan
  # 12pp above the rolling-window MEDIAN (v2.1): the real-shower signal is
  # ~36pp; dip-rebound noise tops out ~9pp on a soupy day.
  shower_spike_pp: 12
  shower_spike_seconds: 180
  post_exit_minutes: 15
  max_runtime_minutes: 60
  #Batteries:
  #class: Battery
  #module: battery
  #threshold: 20

Master Bath Occupancy:
  module: room_occupancy
  class: RoomOccupancy
  sensors:
    - entity: binary_sensor.upstairs_hall_motion
      zone: exterior
    - entity: binary_sensor.master_bath0_motion
      zone: boundary
    - entity: binary_sensor.master_bath1_motion
      zone: interior
  exit_grace_period: 240
  safety_timeout: 1800
  occupancy_entity: input_select.master_bathroom_occupancy
