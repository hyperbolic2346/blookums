# https://github.com/Tzahi12345/YoutubeDL-Material/blob/master/docker-compose.yml
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: youtubedl
  namespace: media
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: docker.io/tzahi12345/youtubedl-material
              tag: 4.3.2
            env:
              TZ: ${TIMEZONE}
              write_ytdl_config: true
            resources:
              requests:
                cpu: 100m
                memory: 256M
              limits:
                cpu: 1000m
                memory: 512M

    service:
      ytd:
        controller: main
        ports:
          http:
            port: 17442

    ingress:
      main:
        enabled: true
        className: internal
        annotations:
          hajimari.io/icon: mdi:youtube
          cert-manager.io/cluster-issuer: letsencrypt-production
        hosts:
          - host: &host ytd.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  name: main
                  port: 17442
        tls:
          - hosts:
              - *host
            secretName: youtubedl-cert

    persistence:
      config:
        enabled: true
        existingClaim: youtubedl-config
        globalMounts:
          - path: /app/appdata
      media:
        enabled: true
        existingClaim: youtubedl-nfs
        globalMounts:
          - path: /app/video