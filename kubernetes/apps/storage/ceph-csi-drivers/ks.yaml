---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ceph-csi-drivers
  namespace: storage
spec:
  # Rook v1.20 upgrade order: rook-ceph -> ceph-csi-drivers -> rook-ceph-cluster
  dependsOn:
    - name: rook-ceph
  path: ./kubernetes/apps/storage/ceph-csi-drivers/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 15m
