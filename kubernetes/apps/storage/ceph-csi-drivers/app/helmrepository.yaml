---
# yaml-language-server: $schema=https://github.com/fluxcd-community/flux2-schemas/raw/main/helmrepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ceph-csi-operator
  namespace: storage
spec:
  # Same source rook-ceph pulls its ceph-csi-operator subchart from.
  interval: 2h
  url: https://ceph.github.io/ceph-csi-operator
  timeout: 3m
