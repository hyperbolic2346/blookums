---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
  namespace: storage
spec:
  interval: 5m
  chart:
    spec:
      chart: rook-ceph-cluster
      version: v1.20.2
      sourceRef:
        kind: HelmRepository
        name: rook-ceph
  values:
    crds:
      enabled: true
    operatorNamespace: storage
    monitoring:
      enabled: true
    ingress:
      dashboard:
        ingressClassName: internal
        annotations:
        host:
          name: rook.${SECRET_DOMAIN}
          path: /
    cephClusterSpec:
      cephConfig:
        global:
          bdev_enable_discard: "true" # quote
          bdev_async_discard_threads: "1" # quote
          osd_class_update_on_start: "false" # quote
        mgr:
          mgr/crash/warn_recent_interval: "7200" #2h
          # Workaround for mgr OOMKills on Ceph 20.2.2: the rook module logs full
          # k8s API responses into the mgr's in-memory recent-log ring, which
          # balloons to the memory limit in hours at the default of 10000.
          # See https://github.com/rook/rook/issues/17786 and
          # https://tracker.ceph.com/issues/78165 — fixed upstream but not yet
          # backported to 20.2.x. REVERT to default once running a fixed release.
          log_max_recent: "100"
      cleanupPolicy:
        wipeDevicesFromOtherClusters: true
      dashboard:
        enabled: true
        urlPrefix: /
        ssl: false
      mgr:
        modules:
          - name: diskprediction_local
            enabled: false
          - name: insights
            enabled: true
          - name: pg_autoscaler
            enabled: true
          - name: rook
            enabled: true
      storage:
        useAllNodes: true
        useAllDevices: true
        config:
          osdsPerDevice: "1"
      resources:
        mgr:
          requests:
            cpu: 125m
            memory: 512Mi
          limits:
            # Bumped 2Gi->3Gi: active mgr on Ceph 20.2.2 (tentacle) retains huge
            # rook-module log entries and OOMKills (rook#17786); log_max_recent
            # above is the actual fix. Can drop back to 2Gi once confirmed stable.
            memory: 3Gi
        mon:
          requests:
            cpu: 50m
            memory: 512Mi
          limits:
            memory: 2Gi
        osd:
          requests:
            cpu: 500m
            memory: 4Gi
          limits:
            memory: 8Gi
        mgr-sidecar:
          requests:
            cpu: 50m
            memory: 100Mi
          limits:
            memory: 200Mi
        crashcollector:
          requests:
            cpu: 15m
            memory: 64Mi
          limits:
            memory: 128Mi
        logcollector:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            memory: 1Gi
        prepareosd:
          requests:
            cpu: 250m
            memory: 50Mi
          limits:
            memory: 2Gi
        cleanup:
          requests:
            cpu: 250m
            memory: 100Mi
          limits:
            memory: 1Gi
    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-block
      deletionPolicy: Delete
    cephBlockPools:
      - name: ceph-ssd-3-replica
        spec:
          failureDomain: host
          replicated:
            size: 3
          deviceClass: ssd
        storageClass:
          enabled: true
          name: ${CLUSTER_STORAGE_BLOCK_SSD_3_REPLICA}
          isDefault: true
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          parameters:
            imageFormat: "2"
            imageFeatures: layering
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: storage
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: storage
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: storage
            csi.storage.k8s.io/fstype: ext4
      - name: ceph-hdd-3-replica
        spec:
          failureDomain: host
          replicated:
            size: 3
          deviceClass: hdd
        storageClass:
          enabled: true
          name: ${CLUSTER_STORAGE_BLOCK_HDD_3_REPLICA}
          isDefault: false
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          parameters:
            imageFormat: "2"
            imageFeatures: layering
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: storage
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: storage
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: storage
            csi.storage.k8s.io/fstype: ext4
    cephFileSystems:
      - name: ceph-ssd-3-replica-filesystem
        spec:
          metadataPool:
            replicated:
              size: 3
          dataPools:
            - failureDomain: host
              replicated:
                size: 3
          metadataServer:
            activeCount: 1
            activeStandby: true
            resources:
              requests:
                cpu: 35m
                memory: 64M
              limits:
                memory: 600M
          deviceClass: ssd
        storageClass:
          enabled: true
          isDefault: false
          name: ${CLUSTER_STORAGE_FILESYSTEM_SSD_3_REPLICA}
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          mountOptions: []
          parameters:
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: storage
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: storage
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
            csi.storage.k8s.io/node-stage-secret-namespace: storage
            csi.storage.k8s.io/fstype: ext4
    cephFilesystemVolumnSnapshotClass:
      enabled: true
      name: csi-ceph-fs
      deletionPolicy: Delete
    cephObjectStores:
      - name: rook-ceph-objectstore
        spec:
          metadataPool:
            failureDomain: host
            replicated:
              size: 3
          dataPool:
            failureDomain: host
            erasureCoded:
              dataChunks: 2
              codingChunks: 1
          preservePoolsOnDelete: true
          gateway:
            port: 80
            resources:
              requests:
                cpu: 100m
                memory: 128M
              limits:
                memory: 2Gi
            instances: 1
          healthCheck:
            bucket:
              interval: 60s
        storageClass:
          enabled: true
          name: ${CLUSTER_STORAGE_BUCKET_SSD_3_REPLICA}
          reclaimPolicy: Delete
          parameters:
            region: us-east-1