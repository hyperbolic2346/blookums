---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/common-3.1.0/charts/library/common/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: satisfactory
  namespace: gaming
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: satisfactory
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      satisfactory:
        containers:
          main:
            image:
              repository: ghcr.io/wolveix/satisfactory-server
              tag: v1.9.10
            env:
              TZ: ${TIMEZONE}
              ROOTLESS: "true"
              AUTOPAUSE: "true"
              MAXPLAYERS: "4"
              AUTOSAVEINTERVAL: "300"
              AUTOSAVENUM: "30"
              MAXTICKRATE: "120"
              NETWORKQUALITY: "3"
              AUTOSAVEONDISCONNECT: "true"
              CRASHREPORT: "false"
              TIMEOUT: "300"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
            probes:
              startup:
                enabled: false
              liveness:
                enabled: false
              readiness:
                enabled: false
            resources:
              requests:
                cpu: 1000m
                memory: 6Gi
              limits:
                memory: 16Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: satisfactory
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        ports:
          game-udp:
            enabled: true
            port: 7777
            protocol: UDP
          game-tcp:
            enabled: true
            port: 7777
            protocol: TCP
          messaging-tcp:
            enabled: true
            port: 8888
            protocol: TCP

    persistence:
      config:
        enabled: true
        existingClaim: satisfactory-data
        globalMounts:
          - path: /config
