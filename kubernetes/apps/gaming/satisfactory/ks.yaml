---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: satisfactory
  namespace: gaming
spec:
  path: ./kubernetes/apps/gaming/satisfactory/app
  prune: true
  dependsOn:
    - name: volsync
      namespace: volsync-system
    - name: rook-ceph-cluster
      namespace: storage
  components:
    - ../../../../components/volsync
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
      - name: cluster-settings
        kind: ConfigMap
    substitute:
      APP: satisfactory
      VOLSYNC_CLAIM: satisfactory-data
      VOLSYNC_SNAPSHOTCLASS: csi-ceph-block
      VOLSYNC_CAPACITY: 30Gi
  patches:
    # Save-corruption protection: hourly snapshots with tiered retention
    # (24 hourly, 7 daily, 4 weekly, 6 monthly). Restic dedupes so storage
    # stays small even with this many restore points.
    - target:
        kind: ReplicationSource
        name: satisfactory-r2
      patch: |
        - op: replace
          path: /spec/trigger/schedule
          value: "0 * * * *"
        - op: replace
          path: /spec/restic/retain
          value:
            hourly: 24
            daily: 7
            weekly: 4
            monthly: 6
