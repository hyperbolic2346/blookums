---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: radar
  namespace: observability
spec:
  parentRefs:
    - name: internal
      namespace: kube-system
      sectionName: https
  hostnames:
    - radar.${SECRET_DOMAIN}
  rules:
    - backendRefs:
        - name: radar
          port: 9280
