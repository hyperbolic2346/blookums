---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: umami
  namespace: observability
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: umami-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # App config
        APP_SECRET: "{{ .APP_SECRET }}"
        DATABASE_URL: "postgresql://{{ .POSTGRES_USER }}:{{ .POSTGRES_PASS }}@postgres-rw.databases.svc.cluster.local:5432/umami?sslmode=disable"
        # Postgres Init
        INIT_POSTGRES_DBNAME: umami
        INIT_POSTGRES_HOST: postgres-rw.databases.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_USER: "{{ .POSTGRES_SUPER_USER }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: umami
    - extract:
        key: cloudnative-pg
