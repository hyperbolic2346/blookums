---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pixyblog
  namespace: pixy
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: pixyblog
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: docker.io/library/wordpress
              tag: 6-apache
            envFrom:
              - secretRef:
                  name: pixyblog-secret
            env:
              WORDPRESS_TABLE_PREFIX: "wp_"
              UMAMI_WEBSITE_ID: "9d71d0ca-e81b-4e70-83b8-9eead29332a4"
              WORDPRESS_CONFIG_EXTRA: |
                define('FORCE_SSL_ADMIN', true);
                if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
                    $_SERVER['HTTPS'] = 'on';
                }
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /wp-cron.php
                    port: 80
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi

        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          securityContext:
            fsGroup: 33

    service:
      main:
        controller: main
        ports:
          http:
            port: 80

    configMaps:
      umami-tracking:
        data:
          umami-tracking.php: |
            <?php
            add_action('wp_head', function() {
                $id = getenv('UMAMI_WEBSITE_ID');
                if ($id) {
                    echo '<script defer src="https://umami.${SECRET_DOMAIN}/script.js" data-website-id="' . esc_attr($id) . '"></script>';
                }
            });

    persistence:
      data:
        existingClaim: pixyblog-data
        globalMounts:
          - path: /var/www/html/wp-content
      umami-tracking:
        type: configMap
        name: pixyblog
        globalMounts:
          - path: /var/www/html/wp-content/mu-plugins/umami-tracking.php
            subPath: umami-tracking.php
            readOnly: true

    route:
      main:
        hostnames: ["blog.fierypyropixy.com"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https-fierypyropixy
        rules:
          - backendRefs:
              - identifier: main
                port: 80
