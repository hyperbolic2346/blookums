---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fierypyropixy
  namespace: websites
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 17.5@sha256:e0c87ce7df39d06b93f27cf2cc6a056611f13faaa88cc07ab4dc8bf7a85d0b11
            envFrom: &envFrom
              - secretRef:
                  name: fierypyropixy-secret
        containers:
          main:
            image:
              repository: 10.0.1.88:30095/fierypyropixy
              tag: 1.0
            envFrom: *envFrom
            probes:
              liveness: &probes
                enabled: false
              readiness: *probes
              startup:
                enabled: false
            resources:
              requests:
                cpu: 500m
                memory: 512M
              limits:
                memory: 2048M
        pod:
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups:
              - 1001
    ingress:
      main:
        enabled: true
        className: internal
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
        hosts:
          - host: &host fierypyropixy.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  name: main
                  port: 80
        tls:
          - hosts:
              - *host
            secretName: fierypyropixy-cert
    persistence:
      media:
        existingClaim: fierypyropixy-images
        globalMounts:
          - path: /var/www/html/images
      thumbnails:
        existingClaim: fierypyropixy-thumbs
        globalMounts:
          - path: /var/www/html/thumbs
    service:
      pixy:
        controller: main
        ports:
          http:
            port: 80
