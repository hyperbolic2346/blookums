---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: openebs
spec:
  interval: 30m
  chart:
    spec:
      chart: openebs
      version: 4.0.1
      sourceRef:
        kind: HelmRepository
        name: openebs
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    zfs-localpv:
      enabled: false
    mayastor:
      image:
        registry: docker.io
        repo: openebs
        tag: release-2.6
      etcd:
        localpvScConfig:
          basePath: "/var/openebs/local/etcd"
      loki-stack:
        localpvScConfig:
          basePath: "/var/openebs/local/loki"
