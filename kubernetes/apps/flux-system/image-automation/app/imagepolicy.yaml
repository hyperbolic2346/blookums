---
# CI tags main-branch builds as main-<shortsha>-b<run#> (stockpile
# .github/workflows/build.yaml); the run number gives a sortable ordering
# that a bare short SHA can't.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: stockpile-api
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: stockpile-api
  filterTags:
    pattern: '^main-[0-9a-f]+-b(?P<build>\d+)$'
    extract: '$build'
  policy:
    numerical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: stockpile-web
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: stockpile-web
  filterTags:
    pattern: '^main-[0-9a-f]+-b(?P<build>\d+)$'
    extract: '$build'
  policy:
    numerical:
      order: asc
