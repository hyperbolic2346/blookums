---
# GHCR pull secret for the image-reflector-controller to scan private images.
# Same 1Password item ("stockpile", GHCR_USER / GHCR_TOKEN with read:packages)
# as the batcave pull secret — this copy just lives in flux-system, where the
# ImageRepositories are.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull
  namespace: flux-system
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: ghcr-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"auth":"{{ printf "%s:%s" .GHCR_USER .GHCR_TOKEN | b64enc }}"}}}
  dataFrom:
    - extract:
        key: stockpile
